openapi: 3.0.3
info:
  title: TikTok Shop AI Video System API
  version: 1.0.0
  description: |
    Java Spring Boot 主业务后端 API。
    前端只调用本 API。
    Python AI 服务和 Render Worker 通过 callback 接口回调本 API。
    V1 契约版本为 1.0.0。AI 回调、RenderManifest 和数据库记录必须保存对应版本号。

servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:8080
    description: Local

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Products
  - name: VideoTasks
  - name: Storyboards
  - name: Videos
  - name: Storage
  - name: Quotas
  - name: Callbacks
  - name: Admin

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Register success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /api/users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/products:
    post:
      tags: [Products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "200":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateProductResponse"

    get:
      tags: [Products]
      summary: List current user's products
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /api/products/{productId}:
    get:
      tags: [Products]
      summary: Get product detail
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetailResponse"

    patch:
      tags: [Products]
      summary: Update product
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductDetailResponse"

  /api/video-tasks:
    post:
      tags: [VideoTasks]
      summary: Create video generation task
      description: |
        创建视频任务时预扣 1 次成片额度。
        Java 创建 task 后调用 Python AI Orchestrator 启动第一阶段工作流。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVideoTaskRequest"
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateVideoTaskResponse"

    get:
      tags: [VideoTasks]
      summary: List current user's video tasks
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/VideoTaskStatus"
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskListResponse"

  /api/video-tasks/{taskId}:
    get:
      tags: [VideoTasks]
      summary: Get task status and detail
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskDetailResponse"

  /api/video-tasks/{taskId}/plans:
    get:
      tags: [VideoTasks]
      summary: Get generated video plans
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Video plans
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoPlanListResponse"

  /api/video-tasks/{taskId}/select-plan:
    post:
      tags: [VideoTasks]
      summary: Select a video plan
      description: |
        用户选择一个视频方案后，Java 保存 selectedPlanId，
        然后调用 Python AI 服务启动第二阶段脚本、分镜、素材生成工作流。
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planId]
              properties:
                planId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Plan selected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskStatusResponse"

  /api/video-tasks/{taskId}/retry:
    post:
      tags: [VideoTasks]
      summary: Retry failed task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Retry accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskStatusResponse"

  /api/video-tasks/{taskId}/cancel:
    post:
      tags: [VideoTasks]
      summary: Cancel an in-progress task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskStatusResponse"

  # ── Fashion Creative Loop V1 (M2) ──

  /api/video-tasks/{taskId}/assets:
    post:
      tags: [VideoTasks]
      summary: Add asset to task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"
      responses:
        "200":
          description: Asset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAssetListResponse"
    get:
      tags: [VideoTasks]
      summary: List task assets
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Asset list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAssetListResponse"

  /api/video-tasks/{taskId}/assets/{assetId}/role:
    patch:
      tags: [VideoTasks]
      summary: Update asset role
      parameters:
        - $ref: "#/components/parameters/TaskId"
        - name: assetId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetRoleRequest"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAssetListResponse"

  /api/video-tasks/{taskId}/assets/confirm:
    post:
      tags: [VideoTasks]
      summary: Confirm assets
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmAssetsRequest"
      responses:
        "200":
          description: Assets confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskStatusResponse"

  /api/video-tasks/{taskId}/creative-state:
    get:
      tags: [VideoTasks]
      summary: Get creative state
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Creative state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreativeStateResponse"
    patch:
      tags: [VideoTasks]
      summary: Update creative state
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCreativeStateRequest"
      responses:
        "200":
          description: Creative state updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreativeStateResponse"

  /api/video-tasks/{taskId}/confirm-plan:
    post:
      tags: [VideoTasks]
      summary: Confirm video plan and proceed to storyboard generation
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPlanRequest"
      responses:
        "200":
          description: Plan confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskStatusResponse"

  /api/video-tasks/{taskId}/confirm-storyboard:
    post:
      tags: [VideoTasks]
      summary: Confirm storyboard and proceed to keyframe configuration
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Storyboard confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskStatusResponse"

  /api/video-tasks/{taskId}/keyframes:
    get:
      tags: [VideoTasks]
      summary: List keyframes
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Keyframe list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyframeListResponse"
    post:
      tags: [VideoTasks]
      summary: Add keyframe (user upload or AI request)
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeyframeRequest"
      responses:
        "200":
          description: Keyframe created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyframeListResponse"

  /api/video-tasks/{taskId}/keyframes/generate:
    post:
      tags: [VideoTasks]
      summary: Generate AI keyframes for unconfigured storyboard shots
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Keyframe generation triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyframeListResponse"

  /api/video-tasks/{taskId}/keyframes/{keyframeId}/confirm:
    post:
      tags: [VideoTasks]
      summary: Confirm a keyframe
      parameters:
        - $ref: "#/components/parameters/TaskId"
        - name: keyframeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmKeyframeRequest"
      responses:
        "200":
          description: Keyframe confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskStatusResponse"

  /api/video-tasks/{taskId}/keyframes/{keyframeId}/reject:
    post:
      tags: [VideoTasks]
      summary: Reject a keyframe
      parameters:
        - $ref: "#/components/parameters/TaskId"
        - name: keyframeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmKeyframeRequest"
      responses:
        "200":
          description: Keyframe rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskStatusResponse"

  /api/video-tasks/{taskId}/keyframes/{keyframeId}/regenerate:
    post:
      tags: [VideoTasks]
      summary: Regenerate a rejected or failed keyframe
      parameters:
        - $ref: "#/components/parameters/TaskId"
        - name: keyframeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Keyframe regeneration triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyframeListResponse"

  /api/video-tasks/{taskId}/video-clips:
    get:
      tags: [VideoTasks]
      summary: List video clips
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Video clip list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoClipListResponse"

  /api/video-tasks/{taskId}/video-clips/{clipId}/confirm:
    post:
      tags: [VideoTasks]
      summary: Confirm a video clip
      parameters:
        - $ref: "#/components/parameters/TaskId"
        - name: clipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmVideoClipRequest"
      responses:
        "200":
          description: Clip confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskStatusResponse"

  /api/video-tasks/{taskId}/video-clips/{clipId}/reject:
    post:
      tags: [VideoTasks]
      summary: Reject a video clip
      parameters:
        - $ref: "#/components/parameters/TaskId"
        - name: clipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmVideoClipRequest"
      responses:
        "200":
          description: Clip rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskStatusResponse"

  /api/video-tasks/{taskId}/render:
    post:
      tags: [VideoTasks]
      summary: Request video render from confirmed clips
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Render requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskStatusResponse"

  /api/video-tasks/{taskId}/approve:
    post:
      tags: [VideoTasks]
      summary: Approve final video review
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Final video approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskStatusResponse"

  /api/video-tasks/{taskId}/feedback:
    post:
      tags: [VideoTasks]
      summary: Submit feedback for repair
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackRequest"
      responses:
        "200":
          description: Feedback received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairEventListResponse"

  /api/video-tasks/{taskId}/repair-events:
    get:
      tags: [VideoTasks]
      summary: List repair events for a task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Repair event list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairEventListResponse"

  /api/video-tasks/{taskId}/storyboard:
    get:
      tags: [Storyboards]
      summary: Get storyboard by task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Storyboard detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryboardResponse"

  /api/storyboards/{storyboardId}:
    patch:
      tags: [Storyboards]
      summary: Update storyboard text fields
      parameters:
        - name: storyboardId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoryboardRequest"
      responses:
        "200":
          description: Storyboard updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryboardResponse"

  /api/videos:
    get:
      tags: [Videos]
      summary: List current user's videos
      parameters:
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/VideoStatus"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Video list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoListResponse"

  /api/videos/{videoId}:
    get:
      tags: [Videos]
      summary: Get video detail
      parameters:
        - $ref: "#/components/parameters/VideoId"
      responses:
        "200":
          description: Video detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoDetailResponse"

  /api/videos/{videoId}/export:
    post:
      tags: [Videos]
      summary: Mark video as exported and return download URL
      parameters:
        - $ref: "#/components/parameters/VideoId"
      responses:
        "200":
          description: Export success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoExportResponse"

  /api/storage/presigned-upload-url:
    post:
      tags: [Storage]
      summary: Get COS presigned upload URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignedUploadRequest"
      responses:
        "200":
          description: Upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignedUploadResponse"

  /api/quotas/me:
    get:
      tags: [Quotas]
      summary: Get current user's quota
      responses:
        "200":
          description: Quota detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserQuotaResponse"

  /api/ai-callbacks/{taskId}:
    post:
      tags: [Callbacks]
      summary: Python AI callback
      security:
        - internalServiceToken: []
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiCallbackRequest"
      responses:
        "200":
          description: Callback accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackResponse"

  /api/render-callbacks/{taskId}:
    post:
      tags: [Callbacks]
      summary: Render Worker callback
      security:
        - internalServiceToken: []
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenderCallbackRequest"
      responses:
        "200":
          description: Callback accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallbackResponse"

  /api/admin/video-tasks:
    get:
      tags: [Admin]
      summary: Admin list all video tasks
      responses:
        "200":
          description: Admin task list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoTaskListResponse"

  /api/admin/model-logs:
    get:
      tags: [Admin]
      summary: Admin list model logs
      responses:
        "200":
          description: Model logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelLogListResponse"

  /api/admin/render-logs:
    get:
      tags: [Admin]
      summary: Admin list render logs
      responses:
        "200":
          description: Render logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderLogListResponse"

  /api/admin/users:
    get:
      tags: [Admin]
      summary: Admin list all users
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Admin user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"

  /api/admin/videos:
    get:
      tags: [Admin]
      summary: Admin list all videos
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/VideoStatus"
        - name: productId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Admin video list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminVideoListResponse"

  /api/admin/quotas:
    get:
      tags: [Admin]
      summary: Admin list user quotas
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Admin quota list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminQuotaListResponse"

  /api/admin/quotas/{userId}:
    patch:
      tags: [Admin]
      summary: Admin update user quota limits
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminQuotaUpdateRequest"
      responses:
        "200":
          description: Updated user quota
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminQuotaDetailResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    internalServiceToken:
      type: apiKey
      in: header
      name: X-Internal-Service-Token

  parameters:
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    VideoId:
      name: videoId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          nullable: true

    ErrorDetail:
      type: object
