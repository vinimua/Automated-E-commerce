spring:
  application:
    name: tk-ai-video-api

  # PostgreSQL 数据源 (腾讯云服务器)
  datasource:
    url: jdbc:postgresql://124.223.200.16:15432/tk_ai_video
    username: tk_user
    password: tk_dev_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history

  # Redis (腾讯云服务器, 16380 避开已有的 6379)
  data:
    redis:
      host: 124.223.200.16
      port: 16380
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # RabbitMQ (腾讯云服务器)
  rabbitmq:
    host: 124.223.200.16
    port: 15673
    username: tk_user
    password: tk_dev_password
    listener:
      simple:
        default-requeue-rejected: false
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: ${JWT_SECRET:tk-ai-video-dev-secret-key-change-in-production}
  access-token-expiration: 3600000    # 1 hour
  refresh-token-expiration: 2592000000 # 30 days
  issuer: tk-ai-video

# 内部服务 Token
internal-service:
  token: ${INTERNAL_SERVICE_TOKEN:internal-dev-token-change-in-production}

# AI 编排服务
ai-orchestrator:
  base-url: http://localhost:8000

# Render Worker
render-worker:
  queue: video.render.queue

# 腾讯云 COS 对象存储
cos:
  secret-id: ${COS_SECRET_ID}
  secret-key: ${COS_SECRET_KEY}
  region: ${COS_REGION:ap-guangzhou}
  bucket: ${COS_BUCKET}
  cdn-domain: ${COS_CDN_DOMAIN:}
  # 预签名 URL 有效期 (分钟)
  presigned-url-expiration: 10
  # 上传限制
  max-file-size-mb: 10
  allowed-folder-prefix: tk-ai-video/
  # 安全 — COS 上传/下载白名单域名
  allowed-domains:
    - myqcloud.com
    - tencentcos.cn

# 服务端口
server:
  port: 8080

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
